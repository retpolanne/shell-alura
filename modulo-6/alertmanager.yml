# https://prometheus.io/docs/alerting/latest/configuration/
global:
  smtp_from: seuemail@provedor.com.br
  # SMTP do iCloud
  smtp_smarthost: smtp.mail.me.com:587
  smtp_auth_username: seuemail@provedor.com.br
  smtp_auth_password_file: /tmp/smtp_password.txt

receivers:
  - name: 'team-mails'
    email_configs:
      - to: 'seuemail@provedor.com.br'

route:
  group_by: ['alertname', 'team']
  group_wait: 30s
  group_interval: 5m
  receiver: 'team-mails'
